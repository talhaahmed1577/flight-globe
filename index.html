<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Globe Flight Simulator</title>
  <link href="https://cdn.jsdelivr.net/npm/cesium@1.112/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/cesium@1.112/Build/Cesium/Cesium.js"></script>
  <link href="style.css" rel="stylesheet">
</head>
<body>
  <div id="toolbar">
    <h2> Flight Simulator</h2>
    <div class="row">
      <label>From:</label>
      <select id="origin"></select>
    </div>
    <div class="row">
      <label>To:</label>
      <select id="destination"></select>
    </div>
    <button id="flyBtn"> Fly Now</button>
    <div id="status">Select cities and click Fly Now</div>
  </div>
  <div id="cesiumContainer"></div>
  <script src="app.js?v=2"></script>
</body>
</html>
